# 默认业务规则。面向全中文用户，允许在界面中覆盖。
model:
  latest_actual_year: 2025
  forecast_start_year: 2026
  dynamic_years: true

ratio_rules:
  hard_min: 1.3
  hard_max: 2.5
  reference_min: 1.8
  reference_max: 2.2

transformer_load_rate:
  hard_min: 0.0
  hard_max: 1.0
  soft_target: 0.5
  preferred_min: 0.4
  preferred_max: 0.6
  warning_low: 0.3
  warning_high: 0.7

coincidence_factor:
  hard_min: 0.83
  hard_max: 0.99
  max_abs_change: 0.1
  editable: true
  priority: low

growth_rules:
  annual_min: -0.02
  annual_max: 0.12
  # 如果为空，由用户在目标设置中指定阶段增长率范围。
  compound_min: null
  compound_max: null

project_rules:
  allow_change_commission_year: false
  allow_change_commission_month: false

external_exchange:
  enabled: true
  priority: very_low
  allow_new_item: true
  require_user_confirmation: true
  send_positive_receive_negative: true
